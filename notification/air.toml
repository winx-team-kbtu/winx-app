root = "."

[build]
  cmd = "go build -o ./tmp/main cmd/http/main.go"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  include_ext = ["go", "mod", "sum", "yaml", "yml", "env"]
  kill_delay = "500ms"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"

[misc]
  clean_on_exit = true
